<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Success</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h2>Successfully Logged In</h2>
  <p>Your unique participant code:</p>
  <div class="success-code" id="uniqueCode">Loading...</div>

  <h3>Questionnaire</h3>
  <iframe 
      width="640px" 
      height="480px" 
      src="https://forms.office.com/Pages/ResponsePage.aspx?id=uhrLqo_zDkGRU8FqAOv0zJ7OAxmk93ZHlh5ihofiqLxUNUk1Qk9HN0hJRUpSVlFPQ1c1Mks0TFNGSy4u&embed=true" 
      frameborder="0" 
      marginwidth="0" 
      marginheight="0" 
      style="border: none; max-width:100%; max-height:100vh" 
      allowfullscreen 
      webkitallowfullscreen 
      mozallowfullscreen 
      msallowfullscreen>
  </iframe>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get("email");

async function loadUniqueCode() {
  const response = await fetch(`http://localhost:3000/unique-code?email=${encodeURIComponent(email)}`);
  const data = await response.json();
  document.getElementById("uniqueCode").innerText = data.code;
}
loadUniqueCode();
</script>
</body>
</html>
